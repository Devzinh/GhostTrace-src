<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GhostTrace Hero</title>
  <desc id="desc">Banner premium do GhostTrace</desc>
  <defs>
    <linearGradient id="bgBase" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#040711"/>
      <stop offset="0.55" stop-color="#0A1630"/>
      <stop offset="1" stop-color="#101F3D"/>
    </linearGradient>

    <radialGradient id="orbRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1030 120) rotate(128) scale(560 330)">
      <stop stop-color="#47D3FF" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#47D3FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orbLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(210 570) rotate(20) scale(460 200)">
      <stop stop-color="#2BC79D" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#2BC79D" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glassStroke" x1="62" y1="62" x2="1022" y2="542" gradientUnits="userSpaceOnUse">
      <stop stop-color="#87E9FF" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#87E9FF" stop-opacity="0.15"/>
    </linearGradient>

    <linearGradient id="chipBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1E72FF"/>
      <stop offset="1" stop-color="#34BCFF"/>
    </linearGradient>

    <linearGradient id="chipGreen" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1BC487"/>
      <stop offset="1" stop-color="#18D6A1"/>
    </linearGradient>

    <linearGradient id="accentLine" x1="118" y1="538" x2="1120" y2="538" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2CE0A3"/>
      <stop offset="0.5" stop-color="#37D0FF"/>
      <stop offset="1" stop-color="#7AB7FF"/>
    </linearGradient>

    <pattern id="dotField" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#9DC4FF" fill-opacity="0.20"/>
    </pattern>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="titleShadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bgBase)"/>
  <rect width="1280" height="640" fill="url(#orbRight)"/>
  <rect width="1280" height="640" fill="url(#orbLeft)"/>

  <rect x="0" y="0" width="1280" height="640" fill="url(#dotField)" opacity="0.24"/>

  <g opacity="0.21" stroke="#83A9DF" stroke-width="1">
    <path d="M0 108H1280"/>
    <path d="M0 186H1280"/>
    <path d="M0 264H1280"/>
    <path d="M0 342H1280"/>
    <path d="M0 420H1280"/>
    <path d="M0 498H1280"/>
    <path d="M74 0V640"/>
    <path d="M274 0V640"/>
    <path d="M474 0V640"/>
    <path d="M674 0V640"/>
    <path d="M874 0V640"/>
    <path d="M1074 0V640"/>
  </g>

  <g opacity="0.7">
    <circle cx="1040" cy="320" r="188" stroke="#8ED6FF" stroke-opacity="0.22" stroke-width="1.5"/>
    <circle cx="1040" cy="320" r="138" stroke="#8ED6FF" stroke-opacity="0.32" stroke-width="1.5"/>
    <circle cx="1040" cy="320" r="88" stroke="#8ED6FF" stroke-opacity="0.45" stroke-width="1.5"/>
    <circle cx="1040" cy="320" r="6" fill="#A4E3FF" filter="url(#softGlow)"/>
    <path d="M928 320H1152" stroke="#8ED6FF" stroke-opacity="0.26" stroke-width="1"/>
    <path d="M1040 208V432" stroke="#8ED6FF" stroke-opacity="0.26" stroke-width="1"/>
  </g>

  <g>
    <rect x="62" y="62" width="960" height="484" rx="30" fill="#FFFFFF" fill-opacity="0.05"/>
    <rect x="62" y="62" width="960" height="484" rx="30" stroke="url(#glassStroke)" stroke-width="1.2"/>
    <rect x="74" y="74" width="936" height="460" rx="24" fill="#0D1A33" fill-opacity="0.28"/>
  </g>

  <g>
    <text x="108" y="170" fill="#8DEBFF" font-family="Bahnschrift, DIN Alternate, Arial Narrow, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="1.65" style="font-kerning: normal; font-feature-settings: 'kern' 1;">FORENSIC TRACE HUNTER</text>
    <text x="108" y="312" fill="#F5FBFF" font-family="Segoe UI Variable Display, Segoe UI, Tahoma, Verdana, sans-serif" font-size="88" font-weight="790" letter-spacing="-0.55" style="font-kerning: normal; font-feature-settings: 'kern' 1;" filter="url(#titleShadow)">Ghost<tspan dx="1.2" letter-spacing="-0.35">Trace</tspan></text>
    <text x="108" y="382" fill="#CFE8FF" font-family="Segoe UI Variable Text, Segoe UI, Tahoma, Arial, sans-serif" font-size="30" font-weight="590" letter-spacing="0.2" style="font-kerning: normal; font-feature-settings: 'kern' 1;">Caixa preta de rastros de software no Windows</text>

    <g>
      <rect x="108" y="418" width="490" height="88" rx="44" fill="url(#chipBlue)"/>
      <rect x="108" y="418" width="490" height="88" rx="44" stroke="#9DDCFF" stroke-opacity="0.42"/>
      <text x="353" y="452" text-anchor="middle" fill="#FFFFFF" font-family="Segoe UI Variable Text, Segoe UI, Arial, sans-serif" font-size="25" font-weight="690" letter-spacing="0.25" style="font-kerning: normal; font-feature-settings: 'kern' 1;">Read-Only Scan</text>
      <text x="353" y="481" text-anchor="middle" fill="#FFFFFF" font-family="Segoe UI Variable Text, Segoe UI, Arial, sans-serif" font-size="25" font-weight="690" letter-spacing="0.16" style="font-kerning: normal; font-feature-settings: 'kern' 1;">+ Limpeza Opcional</text>
    </g>

    <g>
      <rect x="620" y="418" width="330" height="88" rx="44" fill="url(#chipGreen)"/>
      <rect x="620" y="418" width="330" height="88" rx="44" stroke="#B6F9E2" stroke-opacity="0.44"/>
      <text x="785" y="452" text-anchor="middle" fill="#FFFFFF" font-family="Segoe UI Variable Text, Segoe UI, Arial, sans-serif" font-size="25" font-weight="690" letter-spacing="0.28" style="font-kerning: normal; font-feature-settings: 'kern' 1;">Sem</text>
      <text x="785" y="481" text-anchor="middle" fill="#FFFFFF" font-family="Segoe UI Variable Text, Segoe UI, Arial, sans-serif" font-size="25" font-weight="690" letter-spacing="0.18" style="font-kerning: normal; font-feature-settings: 'kern' 1;">Telemetria</text>
    </g>
  </g>

  <path d="M118 538H1120" stroke="url(#accentLine)" stroke-width="4" filter="url(#softGlow)"/>
</svg>
